<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورد الزنبق — شودي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600;800&display=swap" rel="stylesheet">
<style>

/* === styles.css === */
/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --lilac-light: #E6E6FA;
    --lilac-main: #C8A2C8;
    --lilac-dark: #9B59B6;
    --lilac-deep: #663399;
    --night-bg: #0a0a1a;
    --night-mid: #1a1a3e;
    --gold: #FFD700;
    --pink: #FF69B4;
    --white: #ffffff;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Cairo', sans-serif;
    background: var(--night-bg);
    color: var(--white);
    overflow-x: hidden;
    min-height: 100vh;
}

/* ===== خلفية حية ===== */
.live-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 40%, #2d1b4e 70%, #1a1a3e 100%);
    overflow: hidden;
}

/* نجوم */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, white, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, white, transparent),
        radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 230px 80px, white, transparent),
        radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent);
    background-size: 350px 200px;
    animation: twinkle 5s ease-in-out infinite;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.3; }
}

/* سحاب */
.clouds {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0.15;
}

.clouds::before,
.clouds::after {
    content: '';
    position: absolute;
    background: radial-gradient(ellipse, rgba(200,162,200,0.3) 0%, transparent 70%);
    border-radius: 50%;
    animation: float 20s ease-in-out infinite;
}

.clouds::before {
    width: 400px;
    height: 150px;
    top: 20%;
    left: -10%;
    animation-delay: 0s;
}

.clouds::after {
    width: 300px;
    height: 120px;
    top: 60%;
    right: -5%;
    animation-delay: -10s;
}

@keyframes float {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(50px) translateY(-20px); }
    50% { transform: translateX(100px) translateY(10px); }
    75% { transform: translateX(30px) translateY(-10px); }
}

/* القمر */
.moon {
    position: absolute;
    top: 50px;
    left: 50px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at 30% 30%, #FFF8DC, #F0E68C);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,248,220,0.4), 0 0 80px rgba(255,248,220,0.2);
    animation: moonPulse 4s ease-in-out infinite;
}

@keyframes moonPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(255,248,220,0.4), 0 0 80px rgba(255,248,220,0.2); }
    50% { box-shadow: 0 0 60px rgba(255,248,220,0.6), 0 0 100px rgba(255,248,220,0.3); }
}

/* ===== ورد الليلك ===== */
.lilac-container {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.lilac-branch {
    position: absolute;
    bottom: -20px;
    width: 200px;
    height: 400px;
    opacity: 0.7;
}

.lilac-branch.left {
    left: -30px;
    transform: rotate(-15deg);
    transform-origin: bottom center;
    animation: swayLeft 6s ease-in-out infinite;
}

.lilac-branch.right {
    right: -30px;
    transform: rotate(15deg) scaleX(-1);
    transform-origin: bottom center;
    animation: swayRight 7s ease-in-out infinite;
}

@keyframes swayLeft {
    0%, 100% { transform: rotate(-15deg); }
    50% { transform: rotate(-10deg); }
}

@keyframes swayRight {
    0%, 100% { transform: rotate(15deg) scaleX(-1); }
    50% { transform: rotate(10deg) scaleX(-1); }
}

/* أزهار الليلك */
.lilac-flower {
    position: absolute;
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, var(--lilac-light) 0%, var(--lilac-main) 60%, var(--lilac-dark) 100%);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 0 8px rgba(200,162,200,0.6);
    animation: bloom 3s ease-out forwards, floatFlower 8s ease-in-out infinite;
    opacity: 0;
}

@keyframes bloom {
    0% { transform: rotate(-45deg) scale(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: rotate(-45deg) scale(1); opacity: 1; }
}

@keyframes floatFlower {
    0%, 100% { transform: rotate(-45deg) translateY(0); }
    50% { transform: rotate(-45deg) translateY(-10px); }
}

/* بتلات متساقطة */
.falling-petal {
    position: absolute;
    width: 8px;
    height: 8px;
    background: linear-gradient(135deg, var(--lilac-main), var(--lilac-dark));
    border-radius: 50% 0 50% 50%;
    opacity: 0.8;
    animation: fall linear forwards;
    pointer-events: none;
}

@keyframes fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* جزيئات عطر الليلك */
.particles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--lilac-light);
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat 6s ease-in-out infinite;
    box-shadow: 0 0 6px var(--lilac-main);
}

@keyframes particleFloat {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.4; }
    100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
}

/* ===== المحتوى الرئيسي ===== */
.start-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
}

.intro-content {
    text-align: center;
    padding: 40px;
    position: relative;
}

/* العناوين */
.main-title {
    margin-bottom: 30px;
}

.title-line {
    display: block;
    font-family: 'Amiri', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--white);
    text-shadow: 0 0 20px rgba(200,162,200,0.5);
    opacity: 0;
    animation: fadeInUp 1s ease-out forwards;
}

.title-line.highlight {
    font-size: 4rem;
    color: var(--lilac-light);
    text-shadow: 0 0 30px rgba(200,162,200,0.8), 0 0 60px rgba(155,89,182,0.4);
    animation-delay: 0.5s;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* القلب النابض */
.heart-container {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 30px auto;
}

.heart {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--pink), #FF1493);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg);
    animation: heartbeat 1.2s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(255,105,180,0.6);
}

.heart::before,
.heart::after {
    content: '';
    width: 80px;
    height: 80px;
    background: inherit;
    border-radius: 50%;
    position: absolute;
}

.heart::before { top: -40px; left: 0; }
.heart::after { top: 0; left: 40px; }

@keyframes heartbeat {
    0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    15% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.15); }
    30% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    45% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.15); }
}

.heart-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255,105,180,0.3), transparent);
    border-radius: 50%;
    animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}

/* تأثير الكتابة */
.subtitle {
    font-size: 1.3rem;
    color: var(--lilac-light);
    margin: 20px 0 40px;
    min-height: 40px;
    text-shadow: 0 0 10px rgba(200,162,200,0.3);
}

/* زر البداية */
.start-btn {
    position: relative;
    padding: 18px 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--white);
    background: linear-gradient(135deg, var(--lilac-dark), var(--lilac-deep));
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 5px 25px rgba(155,89,182,0.4);
}

.start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 35px rgba(155,89,182,0.6);
}

.btn-glow {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.start-btn:hover .btn-glow {
    opacity: 1;
}

/* قلوب طائرة */
.floating-hearts {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: hidden;
}

.floating-heart {
    position: absolute;
    color: var(--pink);
    font-size: 20px;
    opacity: 0;
    animation: floatUp 4s ease-in forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; transform: scale(1); }
    100% { transform: translateY(-100vh) scale(0.5) rotate(360deg); opacity: 0; }
}

/* ===== تصميم متجاوب ===== */
@media (max-width: 768px) {
    .title-line { font-size: 2rem; }
    .title-line.highlight { font-size: 2.5rem; }
    .moon { width: 50px; height: 50px; top: 20px; left: 20px; }
    .lilac-branch { width: 120px; height: 250px; }
}
/* ===== أزرار التنقل المُحسَّنة ===== */
.nav-back,
.nav-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    padding: 14px 28px;
    background: rgba(200, 162, 200, 0.2);
    border: 2px solid rgba(200, 162, 200, 0.4);
    border-radius: 50px;
    color: var(--lilac-light);
    text-decoration: none;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    transition: all 0.4s ease;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    cursor: pointer;
}

.nav-back {
    left: 25px;
}

.nav-next {
    right: 25px;
}

.nav-back:hover,
.nav-next:hover {
    background: rgba(200, 162, 200, 0.4);
    border-color: rgba(200, 162, 200, 0.8);
    color: var(--white);
    transform: translateY(-50%) scale(1.08);
    box-shadow: 0 8px 30px rgba(200, 162, 200, 0.5);
}

.nav-back::before {
    content: '←';
    font-size: 1.2rem;
    transition: transform 0.3s;
    display: inline-block;
}

.nav-next::after {
    content: '→';
    font-size: 1.2rem;
    transition: transform 0.3s;
    display: inline-block;
}

.nav-back:hover::before {
    transform: translateX(-5px);
}

.nav-next:hover::after {
    transform: translateX(5px);
}

/* ===== للموبايل ===== */
@media (max-width: 768px) {
    .nav-back,
    .nav-next {
        position: fixed;
        top: auto;
        bottom: 20px;
        transform: none;
        padding: 12px 20px;
        font-size: 0.9rem;
        border-radius: 30px;
    }
    
    .nav-back {
        left: 15px;
    }
    
    .nav-next {
        right: 15px;
    }
    
    .nav-back:hover,
    .nav-next:hover {
        transform: scale(1.05);
    }
    
    .page-container {
        padding-bottom: 100px;
    }
}

/* === lily.css === */
/* ===== صفحة الزنبق ===== */
.lily-page {
    min-height: 100vh;
    padding: 100px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    position: relative;
}

/* ===== باقة الزنبق ===== */
.lily-bouquet {
    position: relative;
    width: 450px;
    height: 500px;
    margin: 20px auto;
    flex-shrink: 0;
}

/* ===== وردة الزنبق ===== */
.lily-flower {
    position: absolute;
    cursor: pointer;
    z-index: 10;
}

.lily-flower:hover:not(.bloomed) {
    filter: brightness(1.15);
}

/* ===== SVG الوردة ===== */
.lily-svg {
    width: 100%;
    height: 100%;
    display: block;
}

/* الوردة المغلقة - ظاهرة بالبداية */
.lily-closed {
    display: block;
}

/* الوردة المفتوحة - مخفية بالبداية */
.lily-open {
    display: none;
}

/* لما تتفتح الوردة */
.lily-flower.bloomed .lily-closed {
    display: none;
}

.lily-flower.bloomed .lily-open {
    display: block;
    animation: bloomScale 0.6s ease-out;
}

@keyframes bloomScale {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* توهج الوردة المتفتحة */
.lily-flower.bloomed {
    animation: lilyGlow 2s ease-in-out infinite;
}

.lily-flower.bloomed .lily-open {
    filter: drop-shadow(0 0 15px rgba(255, 105, 180, 0.6));
}

@keyframes lilyGlow {
    0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 105, 180, 0.6)); }
    50% { filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.9)); }
}

/* ===== أوراق خضراء ===== */
.lily-leaf {
    position: absolute;
    z-index: 5;
}

.leaf-svg {
    width: 100%;
    height: 100%;
    display: block;
    opacity: 0.9;
}

/* ===== التعليمات ===== */
.instructions {
    text-align: center;
    max-width: 400px;
    transition: all 0.5s;
}

.instructions.hidden {
    opacity: 0;
    pointer-events: none;
}

.instruction-text {
    font-size: 1.1rem;
    color: var(--lilac-light);
    margin-bottom: 8px;
}

/* ===== عداد الورود ===== */
.bloom-counter {
    display: flex;
    align-items: center;
    gap: 15px;
    background: rgba(255, 105, 180, 0.1);
    border: 1px solid rgba(255, 105, 180, 0.2);
    border-radius: 20px;
    padding: 15px 25px;
    backdrop-filter: blur(10px);
}

.counter-icon {
    font-size: 2rem;
    animation: bounce 1s ease-in-out infinite;
}

.counter-info {
    display: flex;
    flex-direction: column;
}

.counter-label {
    font-size: 0.85rem;
    color: #ff69b4;
}

.counter-value {
    font-family: 'Cairo', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: #ffb6c1;
    text-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
}

/* ===== الرسالة السرية ===== */
.secret-message {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 10, 26, 0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
}

.secret-message.show {
    display: flex;
    animation: fadeIn 0.5s ease-out;
}

.message-box {
    background: rgba(255, 105, 180, 0.1);
    border: 2px solid rgba(255, 105, 180, 0.3);
    border-radius: 25px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(20px);
    animation: scaleIn 0.5s ease-out 0.3s both;
}

.message-icon {
    font-size: 3.5rem;
    margin-bottom: 20px;
    animation: bounce 1s ease-in-out infinite;
}

.secret-title {
    font-family: 'Amiri', serif;
    font-size: 2.2rem;
    color: #ffb6c1;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
}

.secret-text {
    font-size: 1.15rem;
    color: var(--white);
    line-height: 2.2;
    margin-bottom: 20px;
}

.secret-signature {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    color: #ff69b4;
    font-style: italic;
}

.continue-btn {
    margin-top: 30px;
    padding: 14px 45px;
    background: linear-gradient(135deg, #ff69b4, #db7093);
    border: none;
    border-radius: 30px;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
}

.continue-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 30px rgba(255, 105, 180, 0.6);
}

/* ===== رسائل العطر ===== */
.scent-messages {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
}

.scent-message {
    position: absolute;
    background: rgba(255, 105, 180, 0.2);
    border: 1px solid rgba(255, 105, 180, 0.4);
    border-radius: 15px;
    padding: 8px 15px;
    font-size: 0.9rem;
    color: #ffb6c1;
    white-space: nowrap;
    pointer-events: none;
    animation: scentFloat 3s ease-out forwards;
    backdrop-filter: blur(10px);
}

@keyframes scentFloat {
    0% { opacity: 0; transform: translateY(10px) scale(0.8); }
    20% { opacity: 1; transform: translateY(0) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-50px) scale(0.9); }
}

/* ===== أنيميشن ===== */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes fadeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0); }
}

/* ===== متجاوب ===== */
@media (max-width: 768px) {
    .lily-bouquet {
        transform: scale(0.7);
        transform-origin: center center;
    }
    
    .message-box {
        padding: 25px;
        margin: 10px;
    }
    
    .secret-title {
        font-size: 1.6rem;
    }
}
</style>
</head>
<body>
    <div class="live-background">
        <div class="stars"></div>
        <div class="clouds"></div>
        <div class="lilac-container" id="lilacContainer"></div>
        <div class="particles" id="particles"></div>
    </div>

    <div class="page-container">
        <a href="hero.html" class="nav-back">← رجوع</a>
        
        <div class="lily-page">
            <h1 class="page-title">🌸 حديقة اليلك</h1>
            
            <div class="lily-bouquet" id="lilyBouquet"></div>

            <div class="instructions" id="instructions">
                <p class="instruction-text">🖱️ اضغط على الوردة لتفتحها</p>
                <p class="instruction-text">✨ اسحب الماوس لرسم حبيبات الورد</p>
            </div>

            <div class="bloom-counter">
                <div class="counter-icon">🌸</div>
                <div class="counter-info">
                    <span class="counter-label">ورود متفتحة</span>
                    <span class="counter-value" id="bloomCount">0 / 7</span>
                </div>
            </div>

            <div class="secret-message" id="secretMessage">
                <div class="message-box">
                    <div class="message-icon">🌸</div>
                    <h2 class="secret-title">مثل ليلك الحب</h2>
                    <p class="secret-text">
                        اليلك الوردي يعني الحب والسعادة<br>
                        مثلكِ تماماً — جميل، ناعم، مليء بالحياة<br>
                        كل وردة في هذه الباقة تمثل ذكرى من ذكرياتنا 💗
                    </p>
                    <div class="secret-signature">— إلى شودي</div>
                </div>
            </div>

            <div class="scent-messages" id="scentMessages"></div>
        </div>

        <a href="gallery.html" class="nav-next">التالي →</a>
    </div>

    <script>

/* === main.js === */
// ===== متغيرات عامة =====
let audioContext = null;
let bgMusic = null;

// ===== عند تحميل الصفحة =====
document.addEventListener('DOMContentLoaded', () => {
    initLilac();
    initParticles();
    initTypewriter();
    initStartButton();
    createFallingPetals();
});

// ===== ورد الليلك =====
function initLilac() {
    const container = document.getElementById('lilacContainer');
    
    // إنشاء أزهار على الأغصان
    const branches = document.querySelectorAll('.lilac-branch');
    
    branches.forEach(branch => {
        for (let i = 0; i < 25; i++) {
            const flower = document.createElement('div');
            flower.className = 'lilac-flower';
            
            // موقع عشوائي على الغصن
            const top = 20 + Math.random() * 70;
            const left = 30 + Math.random() * 40;
            const delay = Math.random() * 3;
            const size = 8 + Math.random() * 8;
            
            flower.style.cssText = `
                top: ${top}%;
                left: ${left}%;
                width: ${size}px;
                height: ${size}px;
                animation-delay: ${delay}s;
            `;
            
            branch.appendChild(flower);
        }
    });
}

// ===== بتلات متساقطة =====
function createFallingPetals() {
    setInterval(() => {
        const petal = document.createElement('div');
        petal.className = 'falling-petal';
        
        const startX = Math.random() * window.innerWidth;
        const duration = 5 + Math.random() * 5;
        const size = 6 + Math.random() * 6;
        
        petal.style.cssText = `
            left: ${startX}px;
            top: -20px;
            width: ${size}px;
            height: ${size}px;
            animation-duration: ${duration}s;
        `;
        
        document.querySelector('.live-background').appendChild(petal);
        
        setTimeout(() => petal.remove(), duration * 1000);
    }, 1500);
}

// ===== جزيئات العطر =====
function initParticles() {
    const container = document.getElementById('particles');
    
    setInterval(() => {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const x = Math.random() * window.innerWidth;
        const y = window.innerHeight - Math.random() * 200;
        const delay = Math.random() * 2;
        
        particle.style.cssText = `
            left: ${x}px;
            top: ${y}px;
            animation-delay: ${delay}s;
        `;
        
        container.appendChild(particle);
        
        setTimeout(() => particle.remove(), 6000);
    }, 800);
}

// ===== تأثير الكتابة =====
function initTypewriter() {
    const text = "في كل نبضة قلب... أنتِ";
    const element = document.getElementById('typewriterText');
    let index = 0;
    
    function type() {
        if (index < text.length) {
            element.textContent += text.charAt(index);
            index++;
            setTimeout(type, 150);
        } else {
            setTimeout(() => {
                element.textContent = '';
                index = 0;
                type();
            }, 4000);
        }
    }
    
    setTimeout(type, 1500);
}

// ===== زر البداية =====
function initStartButton() {
    const btn = document.getElementById('startBtn');
    
    btn.addEventListener('click', async () => {
        // تشغيل الموسيقى
        await initAudio();
        
        // تأثير القلوب الطائرة
        createBurstHearts();
        
        // الانتقال للصفحة التالية
        setTimeout(() => {
            window.location.href = 'countdown.html';
        }, 2000);
    });
}

// ===== تشغيل الصوت =====
async function initAudio() {
    bgMusic = document.getElementById('bgMusic');
    
    try {
        await bgMusic.play();
        bgMusic.volume = 0.3;
    } catch (e) {
        console.log('Audio autoplay blocked:', e);
    }
}

// ===== انفجار قلوب =====
function createBurstHearts() {
    const container = document.getElementById('floatingHearts');
    const colors = ['💜', '💖', '💕', '💗', '🌸', '✨'];
    
    for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = colors[Math.floor(Math.random() * colors.length)];
        
        const x = 30 + Math.random() * 40;
        const delay = Math.random() * 1;
        
        heart.style.cssText = `
            left: ${x}%;
            bottom: 20%;
            animation-delay: ${delay}s;
            font-size: ${15 + Math.random() * 20}px;
        `;
        
        container.appendChild(heart);
        
        setTimeout(() => heart.remove(), 5000);
    }
}

// ===== أداة مساعدة: عداد الوقت =====
function getTimeSince(date) {
    const now = new Date();
    const diff = now - new Date(date);
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    return { days, hours, minutes, seconds };
}

// ===== أداة مساعدة: تنسيق الأرقام =====
function pad(num) {
    return num.toString().padStart(2, '0');
}

/* === lily.js === */
// ===== متغيرات =====
let bloomedCount = 0;
const TOTAL_FLOWERS = 7;
const SCENT_MESSAGES = [
    'عطر الحب 💗',
    'ذكرى جميلة ✨',
    'شودي 🌸',
    'إلى الأبد 💕',
    'أحبكِ 💗',
    'وردة لكِ 🌸',
    'سعادتي بكِ 😊',
    'قلبي لكِ 💓'
];

// ===== أبعاد الوردة الأساسية =====
const BASE_WIDTH = 100;
const BASE_HEIGHT = 130;

// ===== SVG الوردة المغلقة =====
function getClosedLilySVG(id) {
    return `
    <svg class="lily-svg lily-closed" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="stemGrad-${id}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#4a7c4e"/>
                <stop offset="100%" stop-color="#2d5a2d"/>
            </linearGradient>
            <linearGradient id="budGrad-${id}" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffb6c1"/>
                <stop offset="50%" stop-color="#ff69b4"/>
                <stop offset="100%" stop-color="#db7093"/>
            </linearGradient>
            <linearGradient id="budInner-${id}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff69b4"/>
                <stop offset="100%" stop-color="#c71585"/>
            </linearGradient>
        </defs>
        <rect x="46" y="80" width="8" height="50" fill="url(#stemGrad-${id})" rx="4"/>
        <ellipse cx="50" cy="50" rx="25" ry="40" fill="url(#budGrad-${id})"/>
        <ellipse cx="50" cy="50" rx="20" ry="35" fill="url(#budInner-${id})"/>
        <path d="M50 15 Q35 50 50 85" stroke="#c71585" stroke-width="1" fill="none" opacity="0.3"/>
        <path d="M50 15 Q65 50 50 85" stroke="#c71585" stroke-width="1" fill="none" opacity="0.3"/>
    </svg>
    `;
}

// ===== SVG الوردة المفتوحة =====
function getOpenLilySVG(id) {
    return `
    <svg class="lily-svg lily-open" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="stemGradOpen-${id}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#4a7c4e"/>
                <stop offset="100%" stop-color="#2d5a2d"/>
            </linearGradient>
            <linearGradient id="leafGrad-${id}" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#4a7c4e"/>
                <stop offset="100%" stop-color="#2d5a2d"/>
            </linearGradient>
            <linearGradient id="petalBack-${id}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffb6c1"/>
                <stop offset="50%" stop-color="#ff69b4"/>
                <stop offset="100%" stop-color="#db7093"/>
            </linearGradient>
            <linearGradient id="petalFront-${id}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffc0cb"/>
                <stop offset="30%" stop-color="#ff69b4"/>
                <stop offset="100%" stop-color="#c71585"/>
            </linearGradient>
            <radialGradient id="centerGrad-${id}" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#ff8c00"/>
            </radialGradient>
        </defs>
        <rect x="46" y="80" width="8" height="50" fill="url(#stemGradOpen-${id})" rx="4"/>
        <path d="M50 100 Q20 80 10 110 Q30 120 50 100" fill="url(#leafGrad-${id})"/>
        <path d="M50 100 Q80 80 90 110 Q70 120 50 100" fill="url(#leafGrad-${id})"/>
        <ellipse cx="35" cy="45" rx="18" ry="35" fill="url(#petalBack-${id})" transform="rotate(-25 35 45)"/>
        <ellipse cx="65" cy="45" rx="18" ry="35" fill="url(#petalBack-${id})" transform="rotate(25 65 45)"/>
        <ellipse cx="50" cy="35" rx="15" ry="30" fill="url(#petalBack-${id})" transform="rotate(0 50 35)"/>
        <ellipse cx="30" cy="55" rx="20" ry="38" fill="url(#petalFront-${id})" transform="rotate(-35 30 55)"/>
        <ellipse cx="70" cy="55" rx="20" ry="38" fill="url(#petalFront-${id})" transform="rotate(35 70 55)"/>
        <ellipse cx="50" cy="50" rx="18" ry="35" fill="url(#petalFront-${id})"/>
        <line x1="50" y1="50" x2="42" y2="25" stroke="#ffd700" stroke-width="2"/>
        <line x1="50" y1="50" x2="58" y2="25" stroke="#ffd700" stroke-width="2"/>
        <line x1="50" y1="50" x2="50" y2="22" stroke="#ffd700" stroke-width="2"/>
        <line x1="50" y1="50" x2="45" y2="28" stroke="#ff8c00" stroke-width="1.5"/>
        <line x1="50" y1="50" x2="55" y2="28" stroke="#ff8c00" stroke-width="1.5"/>
        <line x1="50" y1="50" x2="50" y2="25" stroke="#ff8c00" stroke-width="1.5"/>
        <circle cx="42" cy="25" r="4" fill="#ff6347"/>
        <circle cx="58" cy="25" r="4" fill="#ff6347"/>
        <circle cx="50" cy="22" r="4" fill="#ff6347"/>
        <circle cx="50" cy="50" r="12" fill="url(#centerGrad-${id})"/>
        <circle cx="50" cy="50" r="8" fill="#ff8c00"/>
    </svg>
    `;
}

// ===== SVG ورقة خضراء =====
function getLeafSVG(id) {
    return `
    <svg class="leaf-svg" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="leafGrad2-${id}" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#4a7c4e"/>
                <stop offset="100%" stop-color="#2d5a2d"/>
            </linearGradient>
        </defs>
        <path d="M30 100 Q5 70 10 40 Q15 10 30 0 Q45 10 50 40 Q55 70 30 100" fill="url(#leafGrad2-${id})"/>
        <path d="M30 100 Q30 70 30 40 Q30 20 30 5" stroke="#2d5a2d" stroke-width="1" fill="none" opacity="0.5"/>
    </svg>
    `;
}

// ===== عند التحميل =====
document.addEventListener('DOMContentLoaded', () => {
    console.log('Lily page loaded!');
    initLilyBouquet();
    initScentDrawing();
});

// ===== باقة الزنبق =====
function initLilyBouquet() {
    const bouquet = document.getElementById('lilyBouquet');
    if (!bouquet) {
        console.error('lilyBouquet not found!');
        return;
    }
    
    bouquet.style.position = 'relative';
    
    const positions = [
        { x: 225, y: 350, scale: 1.3 },
        { x: 130, y: 320, scale: 1.0 },
        { x: 320, y: 320, scale: 1.0 },
        { x: 80,  y: 380, scale: 0.85 },
        { x: 370, y: 380, scale: 0.85 },
        { x: 170, y: 280, scale: 0.9 },
        { x: 280, y: 280, scale: 0.9 }
    ];
    
    positions.forEach((pos, index) => {
        createLilyFlower(bouquet, index, pos);
    });
    
    createLeaves(bouquet);
}

function createLilyFlower(container, index, pos) {
    const flower = document.createElement('div');
    
    // مهم: بدون bloomed بالبداية!
    flower.className = 'lily-flower';
    flower.id = `lily-${index}`;
    
    const finalWidth = BASE_WIDTH * pos.scale;
    const finalHeight = BASE_HEIGHT * pos.scale;
    
    const left = pos.x - (finalWidth / 2);
    const top = pos.y - finalHeight;
    
    flower.style.cssText = `
        position: absolute;
        left: ${left}px;
        top: ${top}px;
        width: ${finalWidth}px;
        height: ${finalHeight}px;
    `;
    
    const svgId = `flower-${index}`;
    flower.innerHTML = getClosedLilySVG(svgId) + getOpenLilySVG(svgId);
    
    container.appendChild(flower);
    
    flower.addEventListener('click', (e) => {
        e.stopPropagation();
        bloomLily(flower);
    });
    
    console.log(`Created lily ${index}: left=${left.toFixed(1)}, top=${top.toFixed(1)}, size=${finalWidth.toFixed(1)}x${finalHeight.toFixed(1)}`);
}

function createLeaves(container) {
    const leafPositions = [
        { x: 100, y: 400, rotate: -30, scale: 1 },
        { x: 280, y: 420, rotate: 20, scale: 0.9 },
        { x: 190, y: 430, rotate: -10, scale: 1.1 },
        { x: 330, y: 390, rotate: 45, scale: 0.8 },
        { x: 60,  y: 370, rotate: -50, scale: 0.9 }
    ];
    
    leafPositions.forEach((pos, index) => {
        const leaf = document.createElement('div');
        leaf.className = 'lily-leaf';
        
        const leafWidth = 60 * pos.scale;
        const leafHeight = 100 * pos.scale;
        const left = pos.x - (leafWidth / 2);
        const top = pos.y - leafHeight;
        
        leaf.style.cssText = `
            position: absolute;
            left: ${left}px;
            top: ${top}px;
            width: ${leafWidth}px;
            height: ${leafHeight}px;
            transform: rotate(${pos.rotate}deg);
            transform-origin: center bottom;
        `;
        
        leaf.innerHTML = getLeafSVG(`leaf-${index}`);
        container.appendChild(leaf);
    });
}

// ===== تفتيح الوردة =====
function bloomLily(flower) {
    if (flower.classList.contains('bloomed')) return;
    
    flower.classList.add('bloomed');
    bloomedCount++;
    updateCounter();
    
    createBloomParticles(flower);
    showScentMessage(flower);
    
    if (bloomedCount >= TOTAL_FLOWERS) {
        setTimeout(() => {
            showSecretMessage();
        }, 1500);
    }
}

function createBloomParticles(flower) {
    const rect = flower.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    for (let i = 0; i < 12; i++) {
        const particle = document.createElement('div');
        particle.style.cssText = `
            position: fixed;
            left: ${centerX}px;
            top: ${centerY}px;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffb6c1, #ff69b4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 10px #ff69b4;
        `;
        
        document.body.appendChild(particle);
        
        const angle = (Math.PI * 2 * i) / 12;
        const velocity = 40 + Math.random() * 30;
        let x = 0, y = 0;
        let opacity = 1;
        
        function animate() {
            x += Math.cos(angle) * velocity * 0.016;
            y += Math.sin(angle) * velocity * 0.016 - 15 * 0.016;
            opacity -= 0.02;
            
            particle.style.transform = `translate(${x}px, ${y}px)`;
            particle.style.opacity = opacity;
            
            if (opacity > 0) {
                requestAnimationFrame(animate);
            } else {
                particle.remove();
            }
        }
        
        requestAnimationFrame(animate);
    }
}

function showScentMessage(flower) {
    const container = document.getElementById('scentMessages');
    const rect = flower.getBoundingClientRect();
    
    const message = document.createElement('div');
    message.className = 'scent-message';
    message.textContent = SCENT_MESSAGES[Math.floor(Math.random() * SCENT_MESSAGES.length)];
    message.style.left = (rect.left + rect.width / 2) + 'px';
    message.style.top = (rect.top - 20) + 'px';
    message.style.transform = 'translateX(-50%)';
    
    container.appendChild(message);
    setTimeout(() => message.remove(), 3000);
}

// ===== تحديث العداد =====
function updateCounter() {
    const counter = document.getElementById('bloomCount');
    if (!counter) return;
    counter.textContent = `${bloomedCount} / ${TOTAL_FLOWERS}`;
}

// ===== رسم العطر =====
function initScentDrawing() {
    const bouquet = document.getElementById('lilyBouquet');
    if (!bouquet) return;
    
    let isDrawing = false;
    
    bouquet.addEventListener('mousedown', () => isDrawing = true);
    document.addEventListener('mouseup', () => isDrawing = false);
    
    bouquet.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        if (Math.random() > 0.8) {
            createScentTrail(e.clientX, e.clientY);
        }
    });
    
    bouquet.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (Math.random() > 0.8) {
            createScentTrail(touch.clientX, touch.clientY);
        }
    });
}

function createScentTrail(x, y) {
    const particle = document.createElement('div');
    particle.style.cssText = `
        position: fixed;
        left: ${x}px;
        top: ${y}px;
        width: 8px;
        height: 8px;
        background: radial-gradient(circle, #ffb6c1, transparent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 100;
        box-shadow: 0 0 8px #ff69b4;
        animation: fadeOut 1.5s ease-out forwards;
    `;
    
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1500);
}

// ===== إظهار الرسالة السرية =====
function showSecretMessage() {
    const message = document.getElementById('secretMessage');
    if (!message) return;
    
    message.classList.add('show');
    createLilyConfetti();
    
    const box = message.querySelector('.message-box');
    if (box && !box.querySelector('.continue-btn')) {
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✨ أكمل الرحلة';
        closeBtn.className = 'continue-btn';
        closeBtn.addEventListener('click', () => {
            window.location.href = 'gallery.html';
        });
        box.appendChild(closeBtn);
    }
}

// ===== confetti =====
function createLilyConfetti() {
    const colors = ['#ffb6c1', '#ff69b4', '#db7093', '#ffd700', '#ffa500', '#fff'];
    
    for (let i = 0; i < 100; i++) {
        setTimeout(() => {
            const confetti = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            confetti.style.cssText = `
                position: fixed;
                left: ${50 + (Math.random() - 0.5) * 60}%;
                top: 40%;
                width: ${8 + Math.random() * 8}px;
                height: ${8 + Math.random() * 8}px;
                background: ${color};
                border-radius: 50%;
                pointer-events: none;
                z-index: 1001;
                box-shadow: 0 0 10px ${color};
            `;
            
            document.body.appendChild(confetti);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 5 + Math.random() * 8;
            let x = 0, y = 0;
            let vx = Math.cos(angle) * velocity;
            let vy = Math.sin(angle) * velocity - 12;
            let gravity = 0.35;
            let opacity = 1;
            
            function animate() {
                x += vx;
                y += vy;
                vy += gravity;
                vx *= 0.98;
                opacity -= 0.01;
                
                confetti.style.transform = `translate(${x}px, ${y}px)`;
                confetti.style.opacity = opacity;
                
                if (opacity > 0 && y < window.innerHeight) {
                    requestAnimationFrame(animate);
                } else {
                    confetti.remove();
                }
            }
            
            requestAnimationFrame(animate);
        }, i * 15);
    }
}
</script>
