<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العد التنازلي — شودي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600;800&display=swap" rel="stylesheet">
<style>

/* === styles.css === */
/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
--lilac-light: #E6E6FA;
    --lilac-main: #C8A2C8;
    --lilac-dark: #9B59B6;
    --lilac-deep: #663399;
    --night-bg: #0a0a1a;
    --night-mid: #1a1a3e;
    --gold: #FFD700;
    --pink: #FF69B4;
    --white: #ffffff;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Cairo', sans-serif;
    background: var(--night-bg);
    color: var(--white);
    overflow-x: hidden;
    min-height: 100vh;
}



/* ===== المحتوى الرئيسي ===== */
.start-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
}

.intro-content {
    text-align: center;
    padding: 40px;
    position: relative;
}

/* العناوين */
.main-title {
    margin-bottom: 30px;
}

.title-line {
    display: block;
    font-family: 'Amiri', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--white);
    text-shadow: 0 0 20px rgba(200,162,200,0.5);
    opacity: 0;
    animation: fadeInUp 1s ease-out forwards;
}

.title-line.highlight {
    font-size: 4rem;
    color: var(--lilac-light);
    text-shadow: 0 0 30px rgba(200,162,200,0.8), 0 0 60px rgba(155,89,182,0.4);
    animation-delay: 0.5s;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* القلب النابض */
.heart-container {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 30px auto;
}

.heart {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--pink), #FF1493);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg);
    animation: heartbeat 1.2s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(255,105,180,0.6);
}

.heart::before,
.heart::after {
    content: '';
    width: 80px;
    height: 80px;
    background: inherit;
    border-radius: 50%;
    position: absolute;
}

.heart::before { top: -40px; left: 0; }
.heart::after { top: 0; left: 40px; }

@keyframes heartbeat {
    0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    15% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.15); }
    30% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    45% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.15); }
}

.heart-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255,105,180,0.3), transparent);
    border-radius: 50%;
    animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}

/* تأثير الكتابة */
.subtitle {
    font-size: 1.3rem;
    color: var(--lilac-light);
    margin: 20px 0 40px;
    min-height: 40px;
    text-shadow: 0 0 10px rgba(200,162,200,0.3);
}

/* زر البداية */
.start-btn {
    position: relative;
    padding: 18px 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--white);
    background: linear-gradient(135deg, var(--lilac-dark), var(--lilac-deep));
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 5px 25px rgba(155,89,182,0.4);
}

.start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 35px rgba(155,89,182,0.6);
}

.btn-glow {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.start-btn:hover .btn-glow {
    opacity: 1;
}

/* قلوب طائرة */
.floating-hearts {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: hidden;
}

.floating-heart {
    position: absolute;
    color: var(--pink);
    font-size: 20px;
    opacity: 0;
    animation: floatUp 4s ease-in forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; transform: scale(1); }
    100% { transform: translateY(-100vh) scale(0.5) rotate(360deg); opacity: 0; }
}

/* ===== تصميم متجاوب ===== */
@media (max-width: 768px) {
    .title-line { font-size: 2rem; }
    .title-line.highlight { font-size: 2.5rem; }
    .moon { width: 50px; height: 50px; top: 20px; left: 20px; }
    .lilac-branch { width: 120px; height: 250px; }
}
/* ===== أزرار التنقل المُحسَّنة ===== */
.nav-back,
.nav-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    padding: 14px 28px;
    background: rgba(200, 162, 200, 0.2);
    border: 2px solid rgba(200, 162, 200, 0.4);
    border-radius: 50px;
    color: var(--lilac-light);
    text-decoration: none;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    transition: all 0.4s ease;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    cursor: pointer;
}

.nav-back {
    left: 25px;
}

.nav-next {
    right: 25px;
}

.nav-back:hover,
.nav-next:hover {
    background: rgba(200, 162, 200, 0.4);
    border-color: rgba(200, 162, 200, 0.8);
    color: var(--white);
    transform: translateY(-50%) scale(1.08);
    box-shadow: 0 8px 30px rgba(200, 162, 200, 0.5);
}

.nav-back::before {
    content: '←';
    font-size: 1.2rem;
    transition: transform 0.3s;
    display: inline-block;
}

.nav-next::after {
    content: '→';
    font-size: 1.2rem;
    transition: transform 0.3s;
    display: inline-block;
}

.nav-back:hover::before {
    transform: translateX(-5px);
}

.nav-next:hover::after {
    transform: translateX(5px);
}

/* ===== للموبايل ===== */
@media (max-width: 768px) {
    .nav-back,
    .nav-next {
        position: fixed;
        top: auto;
        bottom: 20px;
        transform: none;
        padding: 12px 20px;
        font-size: 0.9rem;
        border-radius: 30px;
    }
    
    .nav-back {
        left: 15px;
    }
    
    .nav-next {
        right: 15px;
    }
    
    .nav-back:hover,
    .nav-next:hover {
        transform: scale(1.05);
    }
    
    .page-container {
        padding-bottom: 100px;
    }
}

/* === countdown.css === */
/* ===== صفحة العد التنازلي ===== */
.countdown-page {
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}

.page-title {
    font-family: 'Amiri', serif;
    font-size: 2.5rem;
    color: var(--lilac-light);
    text-shadow: 0 0 30px rgba(200,162,200,0.5);
    margin-bottom: 20px;
}

/* ===== ساعة رملية ===== */
/* ===== ساعة رملية (من index.html) ===== */
.hourglass-wrap{
  position:relative;
  width:100px;
  height:140px;
  margin:5px 0;
}
.hourglass-outer{
  position:absolute;
  inset:0;
  border:2px solid rgba(200,162,200,0.4);
  border-radius:50px 50px 8px 8px;
  clip-path:polygon(0 0,100% 0,50% 50%,100% 100%,0 100%,50% 50%);
  background:rgba(200,162,200,0.03);
  box-shadow:0 0 20px rgba(200,162,200,0.15),inset 0 0 15px rgba(200,162,200,0.05);
}
.hourglass-glass{
  position:absolute;
  top:2px;
  left:50%;
  transform:translateX(-50%);
  width:80px;
  height:136px;
  border:1px solid rgba(200,162,200,0.2);
  border-radius:40px 40px 4px 4px;
  clip-path:polygon(0 0,100% 0,55% 50%,100% 100%,0 100%,45% 50%);
  background:rgba(200,162,200,0.02);
  overflow:hidden;
}
.hourglass-sand-top{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:80%;
  background:linear-gradient(180deg,var(--lilac-main),var(--lilac-dark));
  clip-path:polygon(0 0,100% 0,60% 100%,40% 100%);
  transition:height 1s linear;
  opacity:0.85;
}
.hourglass-sand-bottom{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:20%;
  background:linear-gradient(180deg,var(--lilac-dark),var(--lilac-main));
  clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);
  transition:height 1s linear;
  opacity:0.85;
}
.hourglass-stream{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:2px;
  height:25px;
  background:linear-gradient(180deg,var(--lilac-main),var(--gold));
  opacity:0.6;
  animation:sandStream 0.8s linear infinite;
}
@keyframes sandStream{0%{opacity:0.3;height:20px}50%{opacity:1;height:30px}100%{opacity:0.3;height:20px}}
.hourglass-glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:120px;
  height:160px;
  background:radial-gradient(ellipse,rgba(200,162,200,0.2),transparent 70%);
  border-radius:50%;
  animation:pulseGlow 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes pulseGlow{0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.7;transform:translate(-50%,-50%) scale(1.1)}}
.hourglass-top-cap,.hourglass-bottom-cap{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:90px;
  height:6px;
  background:linear-gradient(90deg,transparent,rgba(200,162,200,0.5),transparent);
  border-radius:3px;
}
.hourglass-top-cap{top:-3px}
.hourglass-bottom-cap{bottom:-3px}

/* ===== العدادات ===== */
.counters-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 600px;
    width: 100%;
}

.counter-box {
    background: rgba(200,162,200,0.1);
    border: 1px solid rgba(200,162,200,0.3);
    border-radius: 20px;
    padding: 25px 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.counter-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(200,162,200,0.3);
    border-color: rgba(200,162,200,0.6);
}

.counter-number {
    font-family: 'Cairo', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--lilac-light);
    text-shadow: 0 0 15px rgba(200,162,200,0.6);
    line-height: 1;
}

.counter-label {
    font-size: 0.9rem;
    color: var(--lilac-main);
    margin-top: 8px;
}

.counter-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(200,162,200,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.counter-box:hover .counter-glow {
    opacity: 1;
}

/* ===== الرسالة اليومية ===== */
.daily-message {
    background: rgba(200,162,200,0.1);
    border: 1px solid rgba(200,162,200,0.3);
    border-radius: 20px;
    padding: 25px 30px;
    max-width: 500px;
    text-align: center;
    backdrop-filter: blur(10px);
    animation: fadeIn 1s ease-out;
}

.message-icon {
    font-size: 2rem;
    margin-bottom: 10px;
    animation: bounce 2s ease-in-out infinite;
}

.message-text {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    color: var(--lilac-light);
    line-height: 1.8;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* ===== صندوق الأمنيات ===== */
.wishes-section {
    width: 100%;
    max-width: 600px;
}

.section-title {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--lilac-light);
    text-align: center;
    margin-bottom: 20px;
}

.wishes-box {
    background: rgba(200,162,200,0.08);
    border: 1px solid rgba(200,162,200,0.2);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
}

.wishes-list {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 15px;
    padding-right: 10px;
}

.wishes-list::-webkit-scrollbar {
    width: 6px;
}

.wishes-list::-webkit-scrollbar-thumb {
    background: rgba(200,162,200,0.4);
    border-radius: 3px;
}

.wish-item {
    background: rgba(200,162,200,0.15);
    border-radius: 15px;
    padding: 12px 15px;
    margin-bottom: 10px;
    font-size: 0.95rem;
    color: var(--white);
    border-right: 3px solid var(--lilac-main);
    animation: slideIn 0.5s ease-out;
    position: relative;
}

.wish-item::before {
    content: '🌸';
    margin-left: 8px;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

.wish-input-area {
    display: flex;
    gap: 10px;
}

.wish-input {
    flex: 1;
    padding: 12px 15px;
    border: 1px solid rgba(200,162,200,0.3);
    border-radius: 15px;
    background: rgba(200,162,200,0.1);
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.3s;
}

.wish-input:focus {
    border-color: var(--lilac-main);
    box-shadow: 0 0 15px rgba(200,162,200,0.2);
}

.wish-input::placeholder {
    color: rgba(255,255,255,0.4);
}

.wish-btn {
    padding: 12px 25px;
    background: linear-gradient(135deg, var(--lilac-dark), var(--lilac-deep));
    border: none;
    border-radius: 15px;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
}

.wish-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(155,89,182,0.4);
}

/* ===== عداد التفكير ===== */
.thought-counter {
    background: rgba(200,162,200,0.1);
    border: 1px solid rgba(200,162,200,0.3);
    border-radius: 20px;
    padding: 25px 30px;
    max-width: 400px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 15px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
}

.thought-icon {
    font-size: 2.5rem;
    animation: think 3s ease-in-out infinite;
}

@keyframes think {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.thought-content {
    flex: 1;
}

.thought-label {
    display: block;
    font-size: 0.9rem;
    color: var(--lilac-main);
    margin-bottom: 5px;
}

.thought-number {
    font-family: 'Cairo', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--lilac-light);
    text-shadow: 0 0 15px rgba(200,162,200,0.6);
}

.thought-unit {
    font-size: 0.9rem;
    color: var(--lilac-main);
    margin-right: 5px;
}

.thought-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(200,162,200,0.2);
    border-radius: 0 0 20px 20px;
}

.thought-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--lilac-main), var(--lilac-light));
    border-radius: 0 0 20px 20px;
    transition: width 0.5s ease;
}

/* ===== التنقل ===== */
.nav-back,
.nav-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    padding: 15px 20px;
    background: rgba(200,162,200,0.15);
    border: 1px solid rgba(200,162,200,0.3);
    border-radius: 15px;
    color: var(--lilac-light);
    text-decoration: none;
    font-size: 1rem;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    z-index: 100;
}

.nav-back {
    left: 20px;
}

.nav-next {
    right: 20px;
}

.nav-back:hover,
.nav-next:hover {
    background: rgba(200,162,200,0.3);
    transform: translateY(-50%) scale(1.05);
    box-shadow: 0 5px 20px rgba(200,162,200,0.3);
}

.page-container {
    position: relative;
    min-height: 100vh;
}

/* ===== متجاوب ===== */
@media (max-width: 768px) {
    .counters-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .counter-number {
        font-size: 1.8rem;
    }
    
    .nav-back,
    .nav-next {
        position: static;
        display: inline-block;
        margin: 20px;
        transform: none;
    }
    
    .nav-back:hover,
    .nav-next:hover {
        transform: scale(1.05);
    }
    
    .hourglass-wrap {
        transform: scale(0.8);
    }
}

/* ===== خلفية index.html ===== */
.bg-animated {
    position: fixed;
    inset: 0;
    background: 
        radial-gradient(ellipse at 20% 80%, rgba(102,51,153,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255,105,180,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(155,89,182,0.15) 0%, transparent 70%),
        linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #0f0a1a 100%);
    animation: bgShift 8s ease-in-out infinite;
    z-index: 0;
}

@keyframes bgShift {
    0%, 100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(15deg); }
}

/* ===== جسيمات الخلفية ===== */
#bg-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
}

#bg-particles .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatParticle linear infinite;
}

@keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
}
</style>
<base target="_blank">
</head>
<body>
    <div class="bg-animated"></div>
    <div class="particles" id="bg-particles"></div>

    <div class="page-container">
        <a href="index.html" class="nav-back">← رجوع</a>
        
        <div class="countdown-page">
            <h1 class="page-title">⏳ باقي على يوم ملكتي</h1>
            
            <!-- ساعة رملية -->
            <div class="hourglass-wrap">
                <div class="hourglass-outer"></div>
                <div class="hourglass-glass">
                  <div class="hourglass-sand-top" id="sandTop"></div>
                  <div class="hourglass-sand-bottom" id="sandBottom"></div>
                </div>
                <div class="hourglass-stream"></div>
                <div class="hourglass-glow"></div>
                <div class="hourglass-top-cap"></div>
                <div class="hourglass-bottom-cap"></div>
            </div>

            <!-- العدادات -->
            <div class="counters-grid">
                <div class="counter-box">
                    <div class="counter-number" id="days">00</div>
                    <div class="counter-label">يوم</div>
                    <div class="counter-glow"></div>
                </div>
                <div class="counter-box">
                    <div class="counter-number" id="hours">00</div>
                    <div class="counter-label">ساعة</div>
                </div>
                <div class="counter-box">
                    <div class="counter-number" id="minutes">00</div>
                    <div class="counter-label">دقيقة</div>
                </div>
                <div class="counter-box">
                    <div class="counter-number" id="seconds">00</div>
                    <div class="counter-label">ثانية</div>
                </div>
            </div>

            <!-- رسالة يومية -->
            <div class="daily-message" id="dailyMessage">
                <div class="message-icon">💌</div>
                <p class="message-text" id="messageText"></p>
            </div>

function getTimeSince(date) {
    const now = new Date();
    const diff = now - new Date(date);
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    return { days, hours, minutes, seconds };
}

function initCountdown() {
    updateCountdown();

function updateCountdown() {
    const now = new Date();
    const diff = BIRTHDAY - now;
    
    if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.querySelector('.page-title').textContent = '🎉 اليوم هو يومكِ يا ملكتي!';
        return;
    }
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    
    if (daysEl) daysEl.textContent = pad(days);
    if (hoursEl) hoursEl.textContent = pad(hours);
    if (minutesEl) minutesEl.textContent = pad(minutes);
    if (secondsEl) secondsEl.textContent = pad(seconds);
    
    const totalSeconds = Math.floor(diff / 1000);
    const maxSeconds = 30 * 24 * 60 * 60;
    const percentage = Math.max(0, Math.min(100, (totalSeconds / maxSeconds) * 100));
    
    const sandTop = document.getElementById('sandTop');
    const sandBottom = document.getElementById('sandBottom');
    
    if (sandTop && sandBottom) {
        sandTop.style.height = percentage + '%';
        sandBottom.style.height = (100 - percentage) + '%';
    }
}

}

function addWishToDOM(wish) {
    const list = document.getElementById('wishesList');

    const item = document.createElement('div');
    item.className = 'wish-item chat-message';
    item.setAttribute('data-id', wish.id || wish.timestamp);

function escapeHtml(text) {

function initThoughtCounter() {

    let count = parseInt(localStorage.getItem('thoughtCount') || '0');

    setInterval(() => {

        updateThoughtDisplay(count);

function updateThoughtDisplay(count) {
    const counter = document.getElementById('thoughtCount');
    const fill = document.getElementById('thoughtFill');
    
    if (counter) counter.textContent = count.toLocaleString('ar-SA');
    if (fill) fill.style.width = Math.min(100, (count % 100)) + '%';

// ===== confetti =====
function createMiniConfetti(element) {
    const rect = element.getBoundingClientRect();
    const colors = ['#C8A2C8', '#E6E6FA', '#FFD700', '#FF69B4'];
    
    for (let i = 0; i < 15; i++) {
        const confetti = document.createElement('div');
        confetti.style.cssText = `
            position: fixed;
            left: ${rect.left + rect.width / 2}px;
            top: ${rect.top}px;
            width: 8px;
            height: 8px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
        `;
        
        document.body.appendChild(confetti);
        
        const angle = (Math.random() - 0.5) * Math.PI * 2;
        const velocity = 50 + Math.random() * 100;
        const vx = Math.cos(angle) * velocity;
        const vy = Math.sin(angle) * velocity - 100;
        
        let x = 0, y = 0;
        let opacity = 1;
        
        function animate() {
            x += vx * 0.016;
            y += vy * 0.016 + 50 * 0.016 * 0.016;
            opacity -= 0.02;
            
            confetti.style.transform = `translate(${x}px, ${y}px)`;
            confetti.style.opacity = opacity;
            
            if (opacity > 0) requestAnimationFrame(animate);
            else confetti.remove();
        }
        
        requestAnimationFrame(animate);
    }
}

  const wishesRef = ref(db, 'wishes');

  // Load wishes in real-time
  function loadWishesRealtime() {
    const wishesList = document.getElementById('wishesList');
    if (!wishesList) return;

    onValue(wishesRef, (snapshot) => {
      const data = snapshot.val();
      wishesList.innerHTML = '';

      if (data) {
        const wishes = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
        wishes.forEach(wish => addWishToDOM(wish));
        wishesList.scrollTop = wishesList.scrollHeight;
      }
    });
  }

  // Add new wish
  function addWishRealtime(text) {
    const wishData = {
      text: text,
      date: new Date().toLocaleDateString('ar-SA'),
      time: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' }),
      timestamp: Date.now()
    };
    push(wishesRef, wishData);
  }

  // Setup event listeners
  document.addEventListener('DOMContentLoaded', () => {
    const wishesList = document.getElementById('wishesList');
    const wishInput = document.getElementById('wishInput');
    const wishBtn = document.getElementById('wishBtn');

    if (wishesList) loadWishesRealtime();

    if (wishBtn && wishInput) {
      wishBtn.addEventListener('click', () => {
        const text = wishInput.value.trim();
        if (text) {
          addWishRealtime(text);
          wishInput.value = '';
          createMiniConfetti(wishBtn);
        }
      });

      wishInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') wishBtn.click();
      });
    }
  });
</script>
