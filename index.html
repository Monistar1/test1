<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهد — كل الحب</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --lilac-light:#E6E6FA;
  --lilac-main:#C8A2C8;
  --lilac-dark:#9B59B6;
  --lilac-deep:#663399;
  --night-bg:#0a0a1a;
  --gold:#FFD700;
  --pink:#FF69B4;
  --white:#ffffff;
}
body{
  font-family:'Cairo',sans-serif;
  background:var(--night-bg);
  color:var(--white);
  overflow-x:hidden;
  min-height:100vh;
}

/* ===== خلفية ===== */
.bg-animated{
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(102,51,153,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(255,105,180,0.2) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(155,89,182,0.15) 0%,transparent 70%),
    linear-gradient(180deg,#0a0a1a 0%,#1a0a2e 50%,#0f0a1a 100%);
  animation:bgShift 8s ease-in-out infinite;
  z-index:0;
}
@keyframes bgShift{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(15deg)}}

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.particle{
  position:absolute;
  border-radius:50%;
  animation:floatParticle linear infinite;
}
@keyframes floatParticle{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-100px) scale(1);opacity:0}
}

/* ===== شاشة 1: العد التنازلي + شات + جملة ===== */
.screen-1{
  display:flex;
  min-height:100vh;
  padding:40px 20px;
  flex-direction:column;
  align-items:center;
  gap:18px;
  position:relative;
  z-index:10;
}
.page-title{
  font-family:'Amiri',serif;
  font-size:2rem;
  color:var(--lilac-light);
  text-shadow:0 0 30px rgba(200,162,200,0.5);
  text-align:center;
}

/* ===== ساعة رملية محسنة ===== */
.hourglass-wrap{
  position:relative;
  width:100px;
  height:140px;
  margin:5px 0;
}
.hourglass-outer{
  position:absolute;
  inset:0;
  border:2px solid rgba(200,162,200,0.4);
  border-radius:50px 50px 8px 8px;
  clip-path:polygon(0 0,100% 0,50% 50%,100% 100%,0 100%,50% 50%);
  background:rgba(200,162,200,0.03);
  box-shadow:0 0 20px rgba(200,162,200,0.15),inset 0 0 15px rgba(200,162,200,0.05);
}
.hourglass-glass{
  position:absolute;
  top:2px;
  left:50%;
  transform:translateX(-50%);
  width:80px;
  height:136px;
  border:1px solid rgba(200,162,200,0.2);
  border-radius:40px 40px 4px 4px;
  clip-path:polygon(0 0,100% 0,55% 50%,100% 100%,0 100%,45% 50%);
  background:rgba(200,162,200,0.02);
  overflow:hidden;
}
.hourglass-sand-top{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:60px;
  background:linear-gradient(180deg,var(--lilac-main),var(--lilac-dark));
  clip-path:polygon(0 0,100% 0,60% 100%,40% 100%);
  transition:height 1s linear;
  opacity:0.85;
}
.hourglass-sand-bottom{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:25px;
  background:linear-gradient(180deg,var(--lilac-dark),var(--lilac-main));
  clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);
  transition:height 1s linear;
  opacity:0.85;
}
.hourglass-stream{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:2px;
  height:25px;
  background:linear-gradient(180deg,var(--lilac-main),var(--gold));
  opacity:0.6;
  animation:sandStream 0.8s linear infinite;
}
@keyframes sandStream{0%{opacity:0.3;height:20px}50%{opacity:1;height:30px}100%{opacity:0.3;height:20px}}
.hourglass-glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:120px;
  height:160px;
  background:radial-gradient(ellipse,rgba(200,162,200,0.2),transparent 70%);
  border-radius:50%;
  animation:pulseGlow 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes pulseGlow{0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.7;transform:translate(-50%,-50%) scale(1.1)}}
.hourglass-top-cap,.hourglass-bottom-cap{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:90px;
  height:6px;
  background:linear-gradient(90deg,transparent,rgba(200,162,200,0.5),transparent);
  border-radius:3px;
}
.hourglass-top-cap{top:-3px}
.hourglass-bottom-cap{bottom:-3px}

/* عدادات */
.counters-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  max-width:400px;
  width:100%;
}
.counter-box{
  background:rgba(200,162,200,0.1);
  border:1px solid rgba(200,162,200,0.3);
  border-radius:16px;
  padding:14px 6px;
  text-align:center;
  backdrop-filter:blur(10px);
}
.counter-number{
  font-family:'Cairo',sans-serif;
  font-size:1.8rem;
  font-weight:800;
  color:var(--lilac-light);
  text-shadow:0 0 15px rgba(200,162,200,0.6);
  line-height:1;
}
.counter-label{font-size:0.75rem;color:var(--lilac-main);margin-top:4px}

/* جملة رومانسية */
.quote-box{
  background:rgba(200,162,200,0.08);
  border:1px solid rgba(200,162,200,0.25);
  border-radius:20px;
  padding:18px 22px;
  max-width:420px;
  width:100%;
  text-align:center;
  backdrop-filter:blur(10px);
}
.quote-icon{font-size:1.5rem;margin-bottom:6px}
.quote-text{
  font-family:'Amiri',serif;
  font-size:1.05rem;
  color:var(--lilac-light);
  line-height:1.8;
  min-height:50px;
}
.quote-cursor{
  display:inline-block;
  width:2px;
  height:1.1em;
  background:var(--lilac-light);
  margin-right:3px;
  animation:blink 0.8s infinite;
  vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* صندوق رسائل */
.wishes-section{width:100%;max-width:420px}
.section-title{
  font-family:'Amiri',serif;
  font-size:1.1rem;
  color:var(--lilac-light);
  text-align:center;
  margin-bottom:10px;
}
.wishes-box{
  background:rgba(200,162,200,0.08);
  border:1px solid rgba(200,162,200,0.2);
  border-radius:16px;
  padding:12px;
  backdrop-filter:blur(10px);
}
.wishes-list{
  max-height:140px;
  overflow-y:auto;
  margin-bottom:10px;
  padding-right:4px;
}
.wishes-list::-webkit-scrollbar{width:4px}
.wishes-list::-webkit-scrollbar-thumb{background:rgba(200,162,200,0.4);border-radius:3px}
.wish-item{
  background:rgba(200,162,200,0.15);
  border-radius:10px;
  padding:8px 10px;
  margin-bottom:6px;
  font-size:0.85rem;
  color:var(--white);
  border-right:3px solid var(--lilac-main);
  animation:slideIn 0.4s ease-out;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
}
.wish-item::before{content:'🌸';margin-left:4px}
@keyframes slideIn{from{opacity:0;transform:translateX(15px)}to{opacity:1;transform:translateX(0)}}
.wish-input-area{display:flex;gap:6px}
.wish-input{
  flex:1;
  padding:8px 10px;
  border:1px solid rgba(200,162,200,0.3);
  border-radius:10px;
  background:rgba(200,162,200,0.1);
  color:var(--white);
  font-family:'Cairo',sans-serif;
  font-size:0.85rem;
  outline:none;
}
.wish-input::placeholder{color:rgba(255,255,255,0.4)}
.wish-btn{
  padding:8px 14px;
  background:linear-gradient(135deg,var(--lilac-dark),var(--lilac-deep));
  border:none;
  border-radius:10px;
  color:var(--white);
  font-family:'Cairo',sans-serif;
  font-size:0.8rem;
  cursor:pointer;
  transition:all 0.3s;
  white-space:nowrap;
}
.wish-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(155,89,182,0.4)}

/* عداد تفكير */
.thought-counter{
  background:rgba(200,162,200,0.1);
  border:1px solid rgba(200,162,200,0.3);
  border-radius:16px;
  padding:12px 18px;
  max-width:280px;
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  backdrop-filter:blur(10px);
  position:relative;
  overflow:hidden;
}
.thought-icon{font-size:1.5rem;animation:think 3s ease-in-out infinite}
@keyframes think{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.thought-content{flex:1}
.thought-label{font-size:0.75rem;color:var(--lilac-main);display:block}
.thought-number{font-family:'Cairo',sans-serif;font-size:1.4rem;font-weight:800;color:var(--lilac-light);text-shadow:0 0 15px rgba(200,162,200,0.6)}
.thought-unit{font-size:0.75rem;color:var(--lilac-main);margin-right:4px}
.thought-bar{position:absolute;bottom:0;left:0;width:100%;height:3px;background:rgba(200,162,200,0.2);border-radius:0 0 16px 16px}
.thought-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--lilac-main),var(--lilac-light));border-radius:0 0 16px 16px;transition:width 0.5s ease}

/* زر انتقال للـ PIN */
.to-pin-btn{
  padding:14px 40px;
  background:linear-gradient(135deg,var(--lilac-dark),var(--lilac-deep));
  border:none;
  border-radius:50px;
  color:var(--white);
  font-family:'Cairo',sans-serif;
  font-size:1.1rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
  box-shadow:0 5px 20px rgba(155,89,182,0.4);
  position:relative;
  overflow:hidden;
  margin-top:10px;
}
.to-pin-btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 30px rgba(155,89,182,0.6)}
.to-pin-btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s;
}
.to-pin-btn:hover::before{left:100%}

/* ===== شاشة 2: PIN ===== */
.screen-2{
  display:none;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:10;
  opacity:0;
  transition:opacity 0.8s ease;
}
.screen-2.show{display:flex;opacity:1}

.pin-container{
  text-align:center;
  padding:20px;
  width:100%;
  max-width:380px;
}
.pin-heart-wrap{
  position:relative;
  width:120px;
  height:120px;
  margin:0 auto 20px;
}
.pin-heart{
  width:100%;
  height:100%;
  position:relative;
  transform:rotate(-45deg);
  animation:heartbeat 1.4s ease-in-out infinite;
  background:linear-gradient(135deg,var(--pink) 0%,var(--lilac-dark) 100%);
  box-shadow:0 0 25px rgba(255,105,180,0.5),0 0 50px rgba(155,89,182,0.3),inset 0 0 15px rgba(255,255,255,0.1);
}
.pin-heart::before,.pin-heart::after{
  content:'';
  position:absolute;
  width:100%;height:100%;
  border-radius:50%;
  background:inherit;
}
.pin-heart::before{top:-50%;left:0}
.pin-heart::after{top:0;left:50%}

@keyframes heartbeat{0%,100%{transform:rotate(-45deg) scale(1)}14%{transform:rotate(-45deg) scale(1.08)}28%{transform:rotate(-45deg) scale(1)}42%{transform:rotate(-45deg) scale(1.12)}70%{transform:rotate(-45deg) scale(1)}}

.pin-heart.shake{animation:heartbeat 1.4s ease-in-out infinite,heartShake 0.5s ease-in-out}
@keyframes heartShake{0%,100%{transform:rotate(-45deg) translateX(0)}20%{transform:rotate(-45deg) translateX(-10px)}40%{transform:rotate(-45deg) translateX(10px)}60%{transform:rotate(-45deg) translateX(-6px)}80%{transform:rotate(-45deg) translateX(6px)}}

.pin-heart.unlock{animation:unlockBurst 0.8s ease-out forwards}
@keyframes unlockBurst{0%{transform:rotate(-45deg) scale(1);box-shadow:0 0 25px rgba(255,105,180,0.5)}40%{transform:rotate(-45deg) scale(1.4);box-shadow:0 0 80px var(--pink),0 0 120px var(--lilac-dark)}100%{transform:rotate(-45deg) scale(1.1);box-shadow:0 0 40px rgba(255,105,180,0.5)}}

.pin-lock-icon{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  font-size:36px;
  z-index:5;
  filter:drop-shadow(0 0 8px rgba(255,255,255,0.5));
}
.pin-glow-ring{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:170px;height:170px;
  border:2px solid rgba(200,162,200,0.15);
  border-radius:50%;
  animation:ringPulse 3s ease-out infinite;
  pointer-events:none;
}
@keyframes ringPulse{0%{transform:translate(-50%,-50%) scale(0.7);opacity:0.6}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}

.pin-title{font-family:'Amiri',serif;font-size:1.8rem;color:var(--lilac-light);text-shadow:0 0 20px rgba(200,162,200,0.5);margin-bottom:4px}
.pin-sub{font-size:0.9rem;color:var(--lilac-main);opacity:0.75;margin-bottom:28px}

.pin-circles{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-bottom:32px;
  direction:ltr;
}
.pin-dot{
  width:18px;height:18px;
  border-radius:50%;
  border:2px solid rgba(200,162,200,0.35);
  background:transparent;
  transition:all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
  position:relative;
}
.pin-dot.filled{
  background:linear-gradient(135deg,var(--pink),var(--lilac-dark));
  border-color:var(--pink);
  box-shadow:0 0 15px rgba(255,105,180,0.5),0 0 30px rgba(155,89,182,0.3);
  transform:scale(1.15);
}
.pin-dot.filled::after{
  content:'';
  position:absolute;
  inset:-5px;
  border-radius:50%;
  border:1px solid rgba(255,105,180,0.3);
  animation:dotRipple 1.5s ease-out infinite;
}
@keyframes dotRipple{0%{transform:scale(1);opacity:0.6}100%{transform:scale(1.6);opacity:0}}
.pin-dot.error{border-color:#ff4444;background:rgba(255,68,68,0.2);animation:dotError 0.5s ease-in-out}
@keyframes dotError{0%,100%{transform:translateX(0) scale(1)}20%{transform:translateX(-8px) scale(1.1)}40%{transform:translateX(8px) scale(0.9)}60%{transform:translateX(-5px) scale(1.05)}80%{transform:translateX(5px) scale(0.95)}}

.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  max-width:280px;
  margin:0 auto;
}
.key{
  aspect-ratio:1;
  border-radius:50%;
  border:1.5px solid rgba(200,162,200,0.25);
  background:rgba(200,162,200,0.08);
  backdrop-filter:blur(12px);
  color:var(--lilac-light);
  font-family:'Cairo',sans-serif;
  font-size:1.5rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
}
.key:hover{border-color:rgba(200,162,200,0.6);background:rgba(200,162,200,0.15);transform:scale(1.08);box-shadow:0 0 20px rgba(200,162,200,0.2)}
.key:active{transform:scale(0.92);background:rgba(255,105,180,0.2);border-color:var(--pink);box-shadow:0 0 25px rgba(255,105,180,0.5)}
.key.del{font-size:1.2rem;color:#ff6b8a;border-color:rgba(255,107,138,0.3)}
.key.ok{background:linear-gradient(135deg,rgba(155,89,182,0.3),rgba(102,51,153,0.3));border-color:rgba(200,162,200,0.4);font-size:1.2rem}

.pin-error{
  color:#ff6b8a;
  font-size:0.85rem;
  margin-top:18px;
  opacity:0;
  transition:opacity 0.3s;
  min-height:22px;
}
.pin-error.show{opacity:1}

/* ===== شاشة 3: قلب شودي ===== */
.screen-3{
  display:none;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:10;
  opacity:0;
  transition:opacity 1.5s ease;
}
.screen-3.show{display:flex;opacity:1}

.welcome-content{
  text-align:center;
  padding:40px 20px;
  position:relative;
}

.big-heart-wrap{
  position:relative;
  width:180px;
  height:180px;
  margin:0 auto 30px;
}
.big-heart{
  width:150px;
  height:150px;
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-45deg);
  background:linear-gradient(135deg,var(--pink),var(--lilac-dark),var(--lilac-deep));
  animation:bigBeat 2s ease-in-out infinite;
  box-shadow:0 0 40px rgba(255,105,180,0.6),0 0 80px rgba(155,89,182,0.4),0 0 120px rgba(102,51,153,0.2),inset 0 0 30px rgba(255,255,255,0.1);
}
.big-heart::before,.big-heart::after{
  content:'';
  width:150px;height:150px;
  background:inherit;
  border-radius:50%;
  position:absolute;
}
.big-heart::before{top:-75px;left:0}
.big-heart::after{top:0;left:75px}

@keyframes bigBeat{0%,100%{transform:translate(-50%,-50%) rotate(-45deg) scale(1)}15%{transform:translate(-50%,-50%) rotate(-45deg) scale(1.1)}30%{transform:translate(-50%,-50%) rotate(-45deg) scale(1)}45%{transform:translate(-50%,-50%) rotate(-45deg) scale(1.15)}}

.heart-name{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(0deg);
  font-family:'Amiri',serif;
  font-size:2.2rem;
  font-weight:700;
  color:var(--white);
  text-shadow:0 0 20px rgba(255,255,255,0.9),0 0 40px rgba(255,105,180,0.6),0 0 60px rgba(155,89,182,0.4);
  z-index:10;
  animation:nameGlow 2s ease-in-out infinite;
  pointer-events:none;
  letter-spacing:2px;
}
@keyframes nameGlow{0%,100%{text-shadow:0 0 20px rgba(255,255,255,0.9),0 0 40px rgba(255,105,180,0.6)}50%{text-shadow:0 0 30px rgba(255,255,255,1),0 0 60px rgba(255,105,180,0.9),0 0 80px rgba(155,89,182,0.5)}}

.heart-orbits{
  position:absolute;
  inset:-40px;
  pointer-events:none;
}
.orbit-particle{
  position:absolute;
  font-size:14px;
  animation:orbit 5s linear infinite;
  opacity:0.7;
}
@keyframes orbit{0%{transform:rotate(0deg) translateX(100px) rotate(0deg)}100%{transform:rotate(360deg) translateX(100px) rotate(-360deg)}}

.start-btn{
  position:relative;
  padding:16px 50px;
  font-family:'Cairo',sans-serif;
  font-size:1.2rem;
  font-weight:600;
  color:var(--white);
  background:linear-gradient(135deg,var(--lilac-dark),var(--lilac-deep));
  border:none;
  border-radius:50px;
  cursor:pointer;
  overflow:hidden;
  transition:all 0.3s ease;
  box-shadow:0 5px 25px rgba(155,89,182,0.4);
  margin-top:10px;
}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 8px 35px rgba(155,89,182,0.6)}
.start-btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s;
}
.start-btn:hover::before{left:100%}

.burst-hearts{
  position:absolute;
  width:100%;height:100%;
  top:0;left:0;
  pointer-events:none;
  overflow:hidden;
}
.burst-heart{
  position:absolute;
  color:var(--pink);
  font-size:18px;
  opacity:0;
  animation:burstUp 4s ease-in forwards;
}
@keyframes burstUp{0%{transform:translateY(0) scale(0) rotate(0deg);opacity:0}20%{opacity:1;transform:scale(1)}100%{transform:translateY(-100vh) scale(0.5) rotate(360deg);opacity:0}}

/* ===== متجاوب ===== */
@media(max-width:768px){
  .page-title{font-size:1.6rem}
  .counters-grid{grid-template-columns:repeat(2,1fr)}
  .counter-number{font-size:1.5rem}
  .big-heart-wrap{width:150px;height:150px}
  .big-heart{width:120px;height:120px}
  .big-heart::before,.big-heart::after{width:120px;height:120px}
  .big-heart::before{top:-60px}
  .big-heart::after{left:60px}
  .heart-name{font-size:1.8rem}
  .pin-title{font-size:1.5rem}
  .key{font-size:1.3rem}
  .keypad{gap:10px;max-width:260px}
  .hourglass-wrap{width:80px;height:110px}
}
@media(max-width:380px){
  .pin-heart-wrap{width:100px;height:100px}
  .key{font-size:1.2rem}
  .big-heart-wrap{width:130px;height:130px}
  .big-heart{width:100px;height:100px}
  .big-heart::before,.big-heart::after{width:100px;height:100px}
  .big-heart::before{top:-50px}
  .big-heart::after{left:50px}
  .heart-name{font-size:1.5rem}
  .hourglass-wrap{width:70px;height:100px}
}
</style>
<base target="_blank">
</head>
<body>
<div class="bg-animated"></div>
<div class="particles" id="particles"></div>

<!-- ===== الشاشة 1: العد التنازلي + شات + جملة ===== -->
<div class="screen-1" id="screen1">
  <h1 class="page-title">⏳ باقي على يوم ملكتي</h1>

  <!-- ساعة رملية محسنة -->
  <div class="hourglass-wrap">
    <div class="hourglass-outer"></div>
    <div class="hourglass-glass">
      <div class="hourglass-sand-top" id="sandTop"></div>
      <div class="hourglass-sand-bottom" id="sandBottom"></div>
    </div>
    <div class="hourglass-stream"></div>
    <div class="hourglass-glow"></div>
    <div class="hourglass-top-cap"></div>
    <div class="hourglass-bottom-cap"></div>
  </div>

  <div class="counters-grid">
    <div class="counter-box"><div class="counter-number" id="days">00</div><div class="counter-label">يوم</div></div>
    <div class="counter-box"><div class="counter-number" id="hours">00</div><div class="counter-label">ساعة</div></div>
    <div class="counter-box"><div class="counter-number" id="minutes">00</div><div class="counter-label">دقيقة</div></div>
    <div class="counter-box"><div class="counter-number" id="seconds">00</div><div class="counter-label">ثانية</div></div>
  </div>

  <div class="quote-box">
    <div class="quote-icon">💌</div>
    <div class="quote-text" id="quoteText"><span class="quote-cursor"></span></div>
  </div>

  <div class="wishes-section">
    <h3 class="section-title">✨ صندوق رسائل شودي</h3>
    <div class="wishes-box">
      <div class="wishes-list" id="wishesList"></div>
      <div class="wish-input-area">
        <input type="text" class="wish-input" id="wishInput" placeholder="اكتب رسالة شودي..." maxlength="100">
        <button class="wish-btn" id="wishBtn">🌟 أرسل</button>
      </div>
    </div>
  </div>

  <div class="thought-counter">
    <div class="thought-icon">💭</div>
    <div class="thought-content">
      <span class="thought-label">فكرت فيكِ اليوم</span>
      <span class="thought-number" id="thoughtCount">0</span>
      <span class="thought-unit">مرة</span>
    </div>
    <div class="thought-bar"><div class="thought-fill" id="thoughtFill"></div></div>
  </div>

  <button class="to-pin-btn" id="toPinBtn">🔐 افتحي قفل الحب</button>
</div>

<!-- ===== الشاشة 2: PIN ===== -->
<div class="screen-2" id="screen2">
  <div class="pin-container">
    <div class="pin-heart-wrap">
      <div class="pin-glow-ring"></div>
      <div class="pin-heart" id="pinHeart">
        <div class="pin-lock-icon" id="pinLockIcon">🔒</div>
      </div>
    </div>

    <h1 class="pin-title">🔐 قفل الحب</h1>
    <p class="pin-sub">أدخلي رمزنا السري يا شهد 💜</p>

    <div class="pin-circles" id="pinCircles">
      <div class="pin-dot" data-i="0"></div>
      <div class="pin-dot" data-i="1"></div>
      <div class="pin-dot" data-i="2"></div>
      <div class="pin-dot" data-i="3"></div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key del" data-a="del">⌫</button>
      <button class="key" data-n="0">0</button>
      <button class="key ok" data-a="ok">✨</button>
    </div>

    <div class="pin-error" id="pinError">الرمز غير صحيح 💔 جربي تاني</div>
  </div>
</div>

<!-- ===== الشاشة 3: قلب شودي ===== -->
<div class="screen-3" id="screen3">
  <div class="welcome-content">
    <div class="big-heart-wrap">
      <div class="big-heart"></div>
      <div class="heart-name">شودي</div>
      <div class="heart-orbits" id="heartOrbits"></div>
    </div>

    <button class="start-btn" id="startBtn">
      <span>✨ ابدأ رحلتنا</span>
    </button>

    <div class="burst-hearts" id="burstHearts"></div>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// ===== جسيمات =====
(function initParticles(){
  const c=document.getElementById('particles');
  const colors=['#C8A2C8','#FF69B4','#FFD700','#E6E6FA'];
  for(let i=0;i<25;i++){
    const p=document.createElement('div');
    p.className='particle';
    const s=Math.random()*3+1;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*5}s;opacity:${0.3+Math.random()*0.5};`;
    c.appendChild(p);
  }
})();

// ===== شاشة 1: العد التنازلي =====
const BIRTHDAY=new Date('2026-11-01T00:00:00');

function updateCountdown(){
  const now=new Date();
  const diff=BIRTHDAY-now;
  if(diff<=0){
    document.getElementById('days').textContent='00';
    document.getElementById('hours').textContent='00';
    document.getElementById('minutes').textContent='00';
    document.getElementById('seconds').textContent='00';
    document.querySelector('.page-title').textContent='🎉 اليوم هو يومكِ يا ملكتي!';
    return;
  }
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((diff%(1000*60*60))/(1000*60));
  const s=Math.floor((diff%(1000*60))/1000);
  document.getElementById('days').textContent=String(d).padStart(2,'0');
  document.getElementById('hours').textContent=String(h).padStart(2,'0');
  document.getElementById('minutes').textContent=String(m).padStart(2,'0');
  document.getElementById('seconds').textContent=String(s).padStart(2,'0');

  const total=Math.floor(diff/1000);
  const max=30*24*60*60;
  const pct=Math.max(0,Math.min(100,(total/max)*100));
  const st=document.getElementById('sandTop');
  const sb=document.getElementById('sandBottom');
  if(st&&sb){
    st.style.height=(pct*0.6)+'px';
    st.style.clipPath=`polygon(0 0,100% 0,${60-pct*0.2}% 100%,${40+pct*0.2}% 100%)`;
    sb.style.height=(25+(100-pct)*0.35)+'px';
  }
}
updateCountdown();
setInterval(updateCountdown,1000);

// ===== جملة رومانسية يومية =====
const quotes=[
  "أنتِ نبض قلبي وضياء عيني 💜",
  "كل لحظة بعيد عنكِ تُشعرني بأن الوقت يتوقف ⏳",
  "أحبكِ أكثر مما يمكن للكلمات أن تعبر 💕",
  "أنتِ أجمل قصة حب كتبها القدر في حياتي 📖",
  "قلبي يخفق باسمكِ في كل نبضة 💓",
  "أنتِ الحلم الذي لا أريد الاستيقاظ منه 🌙",
  "معكِ أشعر أن العالم كله جميل 🌍",
  "أحبكِ إلى ما لا نهاية وما بعدها ♾️"
];

function typeQuote(text){
  const el=document.getElementById('quoteText');
  el.innerHTML='<span class="quote-cursor"></span>';
  const span=document.createElement('span');
  span.id='quoteContent';
  el.appendChild(span);

  let i=0;
  span.textContent='';
  function type(){
    if(i<text.length){
      span.textContent+=text.charAt(i);
      i++;
      setTimeout(type,60);
    }
  }
  setTimeout(type,300);
}

const dayIdx=new Date().getDate()%quotes.length;
typeQuote(quotes[dayIdx]);

// ===== عداد التفكير =====
(function initThought(){
  const counter=document.getElementById('thoughtCount');
  const fill=document.getElementById('thoughtFill');
  if(!counter)return;
  let count=Math.floor(Math.random()*400)+100;
  function update(){
    counter.textContent=count.toLocaleString('ar-SA');
    if(fill)fill.style.width=Math.min(100,(count%100))+'%';
  }
  update();
  setInterval(()=>{count++;update();},3000);
})();

// ===== انتقال للـ PIN =====
document.getElementById('toPinBtn').addEventListener('click',()=>{
  document.getElementById('screen1').style.display='none';
  const s2=document.getElementById('screen2');
  s2.style.display='flex';
  setTimeout(()=>s2.classList.add('show'),50);
});

// ===== شاشة 2: PIN =====
const CORRECT_PIN='1234';
let pin='';
let pinLocked=true;

const pinHeart=document.getElementById('pinHeart');
const pinLockIcon=document.getElementById('pinLockIcon');
const pinDots=document.querySelectorAll('.pin-dot');
const pinError=document.getElementById('pinError');
const screen2=document.getElementById('screen2');
const screen3=document.getElementById('screen3');

function updatePinDots(){
  pinDots.forEach((d,i)=>{
    d.classList.remove('filled','error');
    if(i<pin.length)d.classList.add('filled');
  });
}

function showPinError(){
  pinDots.forEach(d=>d.classList.add('error'));
  pinError.classList.add('show');
  pinHeart.classList.add('shake');
  setTimeout(()=>{
    pinDots.forEach(d=>d.classList.remove('error'));
    pinError.classList.remove('show');
    pinHeart.classList.remove('shake');
  },1400);
}

function doUnlock(){
  pinLocked=false;
  pinHeart.classList.add('unlock');
  pinLockIcon.textContent='🔓';
  setTimeout(()=>{
    screen2.style.display='none';
    screen3.style.display='flex';
    setTimeout(()=>screen3.classList.add('show'),50);
    initScreen3();
  },1000);
}

function checkPin(){
  if(pin===CORRECT_PIN){doUnlock();}
  else{showPinError();pin='';updatePinDots();}
}

document.getElementById('keypad').addEventListener('click',e=>{
  const k=e.target.closest('.key');
  if(!k||!pinLocked)return;
  const n=k.dataset.n;
  const a=k.dataset.a;
  if(n!==undefined&&pin.length<4){pin+=n;updatePinDots();if(pin.length===4)setTimeout(checkPin,250);}
  else if(a==='del'){pin=pin.slice(0,-1);updatePinDots();pinError.classList.remove('show');}
  else if(a==='ok'&&pin.length===4){checkPin();}
});

document.addEventListener('keydown',e=>{
  if(!pinLocked)return;
  if(e.key>='0'&&e.key<='9'){
    if(pin.length<4){pin+=e.key;updatePinDots();if(pin.length===4)setTimeout(checkPin,250);}
  }else if(e.key==='Backspace'){pin=pin.slice(0,-1);updatePinDots();pinError.classList.remove('show');}
  else if(e.key==='Enter'&&pin.length===4){checkPin();}
});

// ===== شاشة 3: قلب شودي =====
function initScreen3(){
  const orbits=document.getElementById('heartOrbits');
  const emojis=['💜','💖','💕','✨','🌸'];
  for(let i=0;i<6;i++){
    const p=document.createElement('div');
    p.className='orbit-particle';
    p.textContent=emojis[i%emojis.length];
    p.style.animationDelay=(i*0.8)+'s';
    p.style.top='50%';
    p.style.left='50%';
    orbits.appendChild(p);
  }
}

// ===== موسيقى 3 ثواني + انتقال لـ countdown.html =====
document.getElementById('startBtn').addEventListener('click',()=>{
  // تشغيل الموسيقى
  const bgMusic=document.getElementById('bgMusic');
  bgMusic.volume=0.3;
  bgMusic.play().catch(()=>{});

  // إيقاف الموسيقى بعد 3 ثواني
  setTimeout(()=>{
    bgMusic.pause();
    bgMusic.currentTime=0;
  },3000);

  // تأثير قلوب طائرة
  const bh=document.getElementById('burstHearts');
  const colors=['💜','💖','💕','💗','🌸','✨'];
  for(let i=0;i<20;i++){
    const h=document.createElement('div');
    h.className='burst-heart';
    h.textContent=colors[Math.floor(Math.random()*colors.length)];
    h.style.cssText=`left:${30+Math.random()*40}%;bottom:20%;animation-delay:${Math.random()}s;font-size:${14+Math.random()*18}px;`;
    bh.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }

  // الانتقال لـ countdown.html بعد 3 ثواني
  setTimeout(()=>{
    window.location.href='countdown.html';
  },3000);
});

// ===== Firebase Chat =====
(function initChat(){
  const script=document.createElement('script');
  script.type='module';
  script.textContent=`
    import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import{getDatabase,ref,push,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const cfg={
      apiKey:"AIzaSyAENc3TUjTBl47xSmIfuGYjBKxBWaMOVnE",
      authDomain:"yahya-90c6b.firebaseapp.com",
      databaseURL:"https://yahya-90c6b-default-rtdb.firebaseio.com",
      projectId:"yahya-90c6b",
      storageBucket:"yahya-90c6b.firebasestorage.app",
      messagingSenderId:"445642285585",
      appId:"1:445642285585:web:1e3fc3f66b35962aec87b0"
    };
    const app=initializeApp(cfg);
    const db=getDatabase(app);
    const wishesRef=ref(db,'wishes');

    onValue(wishesRef,(snapshot)=>{
      const list=document.getElementById('wishesList');
      if(!list)return;
      const data=snapshot.val();
      list.innerHTML='';
      if(data){
        const wishes=Object.values(data).sort((a,b)=>a.timestamp-b.timestamp);
        wishes.forEach(wish=>{
          const item=document.createElement('div');
          item.className='wish-item';
          item.innerHTML='<span style="flex:1;word-break:break-word;">'+wish.text+'</span><span style="font-size:0.7rem;color:rgba(200,162,200,0.6);white-space:nowrap;">'+(wish.time||'')+'</span>';
          list.appendChild(item);
        });
        list.scrollTop=list.scrollHeight;
      }
    });

    function addWish(text){
      push(wishesRef,{
        text:text,
        date:new Date().toLocaleDateString('ar-SA'),
        time:new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}),
        timestamp:Date.now()
      });
    }

    const btn=document.getElementById('wishBtn');
    const input=document.getElementById('wishInput');
    if(btn&&input){
      btn.addEventListener('click',()=>{
        const t=input.value.trim();
        if(t){addWish(t);input.value='';}
      });
      input.addEventListener('keypress',e=>{if(e.key==='Enter')btn.click();});
    }
  `;
  document.body.appendChild(script);
})();
</script>
</body>
</html>
