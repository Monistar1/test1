<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى الأبد — شهد</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600;800&display=swap" rel="stylesheet">
<style>

/* === styles.css === */
/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --lilac-light: #E6E6FA;
    --lilac-main: #C8A2C8;
    --lilac-dark: #9B59B6;
    --lilac-deep: #663399;
    --night-bg: #0a0a1a;
    --night-mid: #1a1a3e;
    --gold: #FFD700;
    --pink: #FF69B4;
    --white: #ffffff;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Cairo', sans-serif;
    background: var(--night-bg);
    color: var(--white);
    overflow-x: hidden;
    min-height: 100vh;
}

.bg-animated{
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(102,51,153,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(255,105,180,0.2) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(155,89,182,0.15) 0%,transparent 70%),
    linear-gradient(180deg,#0a0a1a 0%,#1a0a2e 50%,#0f0a1a 100%);
  animation:bgShift 8s ease-in-out infinite;
  z-index:0;
}
@keyframes bgShift{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(15deg)}}

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.particle{
  position:absolute;
  border-radius:50%;
  animation:floatParticle linear infinite;
}
@keyframes floatParticle{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-100px) scale(1);opacity:0}
}

/* ===== المحتوى الرئيسي ===== */
.start-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
}

.intro-content {
    text-align: center;
    padding: 40px;
    position: relative;
}

/* العناوين */
.main-title {
    margin-bottom: 30px;
}

.title-line {
    display: block;
    font-family: 'Amiri', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--white);
    text-shadow: 0 0 20px rgba(200,162,200,0.5);
    opacity: 0;
    animation: fadeInUp 1s ease-out forwards;
}

.title-line.highlight {
    font-size: 4rem;
    color: var(--lilac-light);
    text-shadow: 0 0 30px rgba(200,162,200,0.8), 0 0 60px rgba(155,89,182,0.4);
    animation-delay: 0.5s;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* القلب النابض */
.heart-container {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 30px auto;
}

.heart {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--pink), #FF1493);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg);
    animation: heartbeat 1.2s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(255,105,180,0.6);
}

.heart::before,
.heart::after {
    content: '';
    width: 80px;
    height: 80px;
    background: inherit;
    border-radius: 50%;
    position: absolute;
}

.heart::before { top: -40px; left: 0; }
.heart::after { top: 0; left: 40px; }

@keyframes heartbeat {
    0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    15% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.15); }
    30% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    45% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.15); }
}

.heart-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255,105,180,0.3), transparent);
    border-radius: 50%;
    animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}

/* تأثير الكتابة */
.subtitle {
    font-size: 1.3rem;
    color: var(--lilac-light);
    margin: 20px 0 40px;
    min-height: 40px;
    text-shadow: 0 0 10px rgba(200,162,200,0.3);
}

/* زر البداية */
.start-btn {
    position: relative;
    padding: 18px 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--white);
    background: linear-gradient(135deg, var(--lilac-dark), var(--lilac-deep));
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 5px 25px rgba(155,89,182,0.4);
}

.start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 35px rgba(155,89,182,0.6);
}

.btn-glow {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.start-btn:hover .btn-glow {
    opacity: 1;
}

/* قلوب طائرة */
.floating-hearts {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: hidden;
}

.floating-heart {
    position: absolute;
    color: var(--pink);
    font-size: 20px;
    opacity: 0;
    animation: floatUp 4s ease-in forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; transform: scale(1); }
    100% { transform: translateY(-100vh) scale(0.5) rotate(360deg); opacity: 0; }
}

/* ===== تصميم متجاوب ===== */
@media (max-width: 768px) {
    .title-line { font-size: 2rem; }
    .title-line.highlight { font-size: 2.5rem; }
    
    .lilac-branch { width: 120px; height: 250px; }
}
/* ===== أزرار التنقل المُحسَّنة ===== */
.nav-back,
.nav-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    padding: 14px 28px;
    background: rgba(200, 162, 200, 0.2);
    border: 2px solid rgba(200, 162, 200, 0.4);
    border-radius: 50px;
    color: var(--lilac-light);
    text-decoration: none;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    transition: all 0.4s ease;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    cursor: pointer;
}

.nav-back {
    left: 25px;
}

.nav-next {
    right: 25px;
}

.nav-back:hover,
.nav-next:hover {
    background: rgba(200, 162, 200, 0.4);
    border-color: rgba(200, 162, 200, 0.8);
    color: var(--white);
    transform: translateY(-50%) scale(1.08);
    box-shadow: 0 8px 30px rgba(200, 162, 200, 0.5);
}

.nav-back::before {
    content: '←';
    font-size: 1.2rem;
    transition: transform 0.3s;
    display: inline-block;
}

.nav-next::after {
    content: '→';
    font-size: 1.2rem;
    transition: transform 0.3s;
    display: inline-block;
}

.nav-back:hover::before {
    transform: translateX(-5px);
}

.nav-next:hover::after {
    transform: translateX(5px);
}

/* ===== للموبايل ===== */
@media (max-width: 768px) {
    .nav-back,
    .nav-next {
        position: fixed;
        top: auto;
        bottom: 20px;
        transform: none;
        padding: 12px 20px;
        font-size: 0.9rem;
        border-radius: 30px;
    }
    
    .nav-back {
        left: 15px;
    }
    
    .nav-next {
        right: 15px;
    }
    
    .nav-back:hover,
    .nav-next:hover {
        transform: scale(1.05);
    }
    
    .page-container {
        padding-bottom: 100px;
    }
}

/* === footer.css === */
/* ===== صفحة الختامية ===== */
.footer-page {
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
}

/* ===== عداد أيام الحب ===== */
.love-counter-section {
    text-align: center;
}

.section-title {
    font-family: 'Amiri', serif;
    font-size: 1.8rem;
    color: var(--lilac-light);
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(200,162,200,0.4);
}

.love-counter {
    background: rgba(200,162,200,0.1);
    border: 2px solid rgba(200,162,200,0.3);
    border-radius: 25px;
    padding: 40px 60px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
}

.counter-digit {
    font-family: 'Cairo', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    color: var(--lilac-light);
    text-shadow: 0 0 30px rgba(200,162,200,0.8);
    line-height: 1;
    animation: counterPulse 2s ease-in-out infinite;
}

@keyframes counterPulse {
    0%, 100% { transform: scale(1); text-shadow: 0 0 30px rgba(200,162,200,0.8); }
    50% { transform: scale(1.05); text-shadow: 0 0 50px rgba(200,162,200,1); }
}

.counter-unit {
    font-size: 1.1rem;
    color: var(--lilac-main);
    margin-top: 10px;
}

.counter-hearts {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
}

.counter-heart {
    position: absolute;
    font-size: 1.5rem;
    animation: floatHeart 3s ease-in-out infinite;
    opacity: 0.6;
}

@keyframes floatHeart {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
    50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
}

/* ===== الرسائل المتغيرة ===== */
.quote-section {
    max-width: 600px;
    width: 100%;
}

.quote-box {
    background: rgba(200,162,200,0.1);
    border: 1px solid rgba(200,162,200,0.2);
    border-radius: 20px;
    padding: 35px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.5s;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.quote-box:hover {
    border-color: rgba(200,162,200,0.5);
    box-shadow: 0 10px 30px rgba(200,162,200,0.2);
}

.quote-icon {
    font-size: 2.5rem;
    margin-bottom: 15px;
    animation: pulse 2s ease-in-out infinite;
}

.quote-text {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    color: var(--lilac-light);
    line-height: 2;
    margin-bottom: 15px;
    min-height: 80px;
}

.quote-author {
    font-size: 0.95rem;
    color: var(--lilac-main);
    font-style: italic;
}

/* ===== زر القبلة ===== */
.kiss-section {
    position: relative;
}

.kiss-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 45px;
    background: linear-gradient(135deg, var(--pink), #FF1493);
    border: none;
    border-radius: 50px;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 25px rgba(255,105,180,0.4);
}

.kiss-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 35px rgba(255,105,180,0.6);
}

.kiss-icon {
    font-size: 1.8rem;
    animation: kissWiggle 1s ease-in-out infinite;
}

@keyframes kissWiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
}

.flying-kisses {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
}

.flying-kiss {
    position: absolute;
    font-size: 2rem;
    animation: flyKiss 4s ease-out forwards;
}

@keyframes flyKiss {
    0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; transform: scale(1); }
    100% { transform: translateY(-100vh) scale(0.5) rotate(360deg); opacity: 0; }
}

/* ===== التوقيع الرقمي ===== */
.signature-section {
    text-align: center;
}

.digital-signature {
    background: rgba(200,162,200,0.08);
    border: 2px solid rgba(200,162,200,0.2);
    border-radius: 25px;
    padding: 40px;
    position: relative;
    backdrop-filter: blur(10px);
    max-width: 400px;
}

.signature-line {
    font-size: 1rem;
    color: var(--lilac-main);
    margin-bottom: 10px;
}

.signature-name {
    font-family: 'Amiri', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--lilac-light);
    text-shadow: 0 0 30px rgba(200,162,200,0.6);
    margin-bottom: 10px;
}

.signature-date {
    font-size: 0.9rem;
    color: var(--lilac-main);
    margin-bottom: 20px;
}

.signature-stamp {
    position: absolute;
    bottom: -25px;
    left: 50%;
    transform: translateX(-50%);
}

.stamp-circle {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--lilac-dark), var(--lilac-deep));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 20px rgba(155,89,182,0.4);
    animation: stampPulse 3s ease-in-out infinite;
}

.stamp-heart {
    font-size: 1.5rem;
}

@keyframes stampPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 5px 20px rgba(155,89,182,0.4); }
    50% { transform: scale(1.1); box-shadow: 0 8px 30px rgba(155,89,182,0.6); }
}

/* ===== روابط الصفحات ===== */
.pages-nav {
    text-align: center;
    max-width: 700px;
    width: 100%;
}

.nav-title {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--lilac-light);
    margin-bottom: 25px;
}

.nav-links {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
}

.nav-link {
    display: block;
    padding: 12px 20px;
    background: rgba(200,162,200,0.1);
    border: 1px solid rgba(200,162,200,0.2);
    border-radius: 15px;
    color: var(--lilac-light);
    text-decoration: none;
    font-size: 0.95rem;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
}

.nav-link:hover {
    background: rgba(200,162,200,0.25);
    transform: translateY(-3px);
    border-color: rgba(200,162,200,0.5);
    box-shadow: 0 5px 15px rgba(200,162,200,0.2);
}

/* ===== إعادة التشغيل ===== */
.restart-section {
    margin-top: 20px;
}

.restart-btn {
    padding: 15px 40px;
    background: transparent;
    border: 2px solid rgba(200,162,200,0.4);
    border-radius: 30px;
    color: var(--lilac-light);
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
}

.restart-btn:hover {
    background: rgba(200,162,200,0.15);
    border-color: rgba(200,162,200,0.7);
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(200,162,200,0.3);
}

/* ===== متجاوب ===== */
@media (max-width: 768px) {
    .counter-digit {
        font-size: 3rem;
    }
    
    .nav-links {
        grid-template-columns: 1fr 1fr;
    }
    
    .quote-text {
        font-size: 1.1rem;
    }
    
    .signature-name {
        font-size: 2rem;
    }
}
</style>
</head>

/* === main.js === */
// ===== متغيرات عامة =====
let audioContext = null;
let bgMusic = null;

// ===== عند تحميل الصفحة =====
document.addEventListener('DOMContentLoaded', () => {
    initLilac();
    initParticles();
    initTypewriter();
    initStartButton();
    createFallingPetals();
});

// ===== ورد الليلك =====
function initLilac() {
    const container = document.getElementById('lilacContainer');
    
    // إنشاء أزهار على الأغصان
    const branches = document.querySelectorAll('.lilac-branch');
    
    branches.forEach(branch => {
        for (let i = 0; i < 25; i++) {
            const flower = document.createElement('div');
            flower.className = 'lilac-flower';
            
            // موقع عشوائي على الغصن
            const top = 20 + Math.random() * 70;
            const left = 30 + Math.random() * 40;
            const delay = Math.random() * 3;
            const size = 8 + Math.random() * 8;
            
            flower.style.cssText = `
                top: ${top}%;
                left: ${left}%;
                width: ${size}px;
                height: ${size}px;
                animation-delay: ${delay}s;
            `;
            
            branch.appendChild(flower);
        }
    });
}

// ===== بتلات متساقطة =====
function createFallingPetals() {
    setInterval(() => {
        const petal = document.createElement('div');
        petal.className = 'falling-petal';
        
        const startX = Math.random() * window.innerWidth;
        const duration = 5 + Math.random() * 5;
        const size = 6 + Math.random() * 6;
        
        petal.style.cssText = `
            left: ${startX}px;
            top: -20px;
            width: ${size}px;
            height: ${size}px;
            animation-duration: ${duration}s;
        `;
        
        document.querySelector('.bg-animated').appendChild(petal);
        
        setTimeout(() => petal.remove(), duration * 1000);
    }, 1500);
}

// ===== جزيئات العطر =====
function initParticles() {
    const container = document.getElementById('particles');
    
    setInterval(() => {

function initTypewriter() {
    const text = "في كل نبضة قلب... أنتِ";
    const element = document.getElementById('typewriterText');
    let index = 0;
    
    function type() {
        if (index < text.length) {
            element.textContent += text.charAt(index);
            index++;
            setTimeout(type, 150);
        } else {
            setTimeout(() => {
                element.textContent = '';
                index = 0;
                type();
            }, 4000);
        }
    }
    
    setTimeout(type, 1500);
}

// ===== أداة مساعدة: عداد الوقت =====
function getTimeSince(date) {
    const now = new Date();
    const diff = now - new Date(date);
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    return { days, hours, minutes, seconds };
}

        for (let i = 0; i < 8; i++) {

// ===== أداة مساعدة: عداد الأرقام =====
function animateNumber(element, start, end, duration) {
    const startTime = performance.now();
    
    function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 3);
        
        const current = Math.floor(start + (end - start) * easeProgress);
        element.textContent = current.toLocaleString('ar-SA');
        
        if (progress < 1) {
            requestAnimationFrame(update);
        }
    }
    
    requestAnimationFrame(update);
}
